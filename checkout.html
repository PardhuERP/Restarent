<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Checkout</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<h1>Checkout</h1>
</header>

<div class="card">

<input type="text"
id="customerName"
placeholder="Full Name"
required>

<input type="tel"
id="mobile"
placeholder="Mobile Number"
required>

<textarea
id="address"
placeholder="Delivery Address"></textarea>

<input type="text"
id="landmark"
placeholder="Landmark">

<textarea
id="instructions"
placeholder="Special Instructions (Optional)">
</textarea>

</div>

<div class="card">

<h3>Payment Details</h3>

<p>
UPI ID:
<strong>999999999@ybl</strong>
</p>

<input
type="text"
id="utr"
placeholder="Enter UTR Number">

</div>

<div class="card">

<h3>Order Summary</h3>

<div id="orderSummary"></div>

<h3 id="subtotal"></h3>
<h3 id="delivery"></h3>
<h2 id="grandTotal"></h2>

<button
class="checkout-btn"
onclick="submitOrder()">
Place Order
</button>

</div>

<script src="checkout.js"></script>

</body>
</html>
